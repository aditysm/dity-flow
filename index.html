  <!--
  =============================================================================
  WAF & SECURITY BEST PRACTICES CONFIGURATION RECOMMENDATIONS (Cloudflare & Server)
  =============================================================================
  1. CLOUDFLARE WAF (Web Application Firewall):
     - Aktifkan "Cloudflare Under Attack Mode" jika mengalami lonjakan trafik bot DDoS/Scraping yang tidak biasa.
     - Tambahkan Firewall Rules untuk menantang (Managed Challenge/CAPTCHA) setiap request ke endpoint `/rpc/find_cheapest_route` yang melebihi 10 requests per 10 detik dari satu alamat IP tunggal.
     - Konfigurasikan SSL/TLS mode ke "Full (Strict)" untuk mengenkripsi semua komunikasi antara Cloudflare dan hosting server.

  2. RECOMMENDED RESPONSES HEADERS (Server-Side Hardening):
     - X-Frame-Options: SAMEORIGIN (Mencegah serangan Clickjacking)
     - X-Content-Type-Options: nosniff (Mencegah MIME-sniffing attacks)
     - Referrer-Policy: strict-origin-when-cross-origin (Melindungi privasi url referal)
     - Permissions-Policy: camera=(), microphone=(), geolocation=() (Menonaktifkan fitur sensor yang tidak digunakan)
  =============================================================================
  -->

  <script>
    (function() {
      function updateFavicon(isDark) {
        const favicon = document.querySelector('link[rel="icon"]');
        if (favicon) {
          if (isDark) {
            favicon.setAttribute('href', 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect x="3" y="3" width="94" height="94" rx="28" fill="%23121214" stroke="%23242426" stroke-width="6"/><path d="M 35,35 L 20,50 L 35,65" fill="none" stroke="%2300ba68" stroke-width="14" stroke-linecap="square" stroke-linejoin="miter"/><path d="M 50,15 L 85,50 L 50,85 L 50,65 L 65,50 L 50,35 Z" fill="%2300ba68"/></svg>');
          } else {
            favicon.setAttribute('href', 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect x="0" y="0" width="100" height="100" rx="28" fill="%2300ba68"/><path d="M 35,35 L 20,50 L 35,65" fill="none" stroke="%23ffffff" stroke-width="14" stroke-linecap="square" stroke-linejoin="miter"/><path d="M 50,15 L 85,50 L 50,85 L 50,65 L 65,50 L 50,35 Z" fill="%23ffffff"/></svg>');
          }
        }
      }
      const theme = localStorage.getItem('theme') || 'dark';
      const isDark = theme === 'dark';
      if (isDark) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', () => updateFavicon(isDark));
      } else {
        updateFavicon(isDark);
      }
      window.__updateFavicon = updateFavicon;
    })();
  </script>

    @keyframes aurora-flow {
      0% {
        filter: blur(80px);
        transform: translate(-50%, -5%) scale(1) rotate(0deg);

      }
      50% {
        filter: blur(100px);
        transform: translate(-47%, -12%) scale(1.1) rotate(6deg);

      }
      100% {
        filter: blur(80px);
        transform: translate(-50%, -5%) scale(1) rotate(0deg);

      }

    .aurora-bg {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translate(-50%, 0);
      width: 140%;
      height: 800px;
      pointer-events: none;
      z-index: 1;
      background: radial-gradient(circle at 50% 25%, rgba(0, 255, 148, 0.05) 0%, rgba(59, 130, 246, 0.02) 40%, transparent 70%);
      transition: all 0.5s ease;
    }

  <script>
    if (history.scrollRestoration) {
      history.scrollRestoration = 'manual';
    }
    window.addEventListener('DOMContentLoaded', () => {
      window.scrollTo(0, 0);
    });

    // Scroll to top logic
    const scrollToTopBtn = document.getElementById('scroll-to-top');
    window.addEventListener('scroll', () => {
      if (window.scrollY > 300) {
        scrollToTopBtn.classList.remove('opacity-0', 'invisible', 'translate-y-4');
        scrollToTopBtn.classList.add('opacity-100', 'visible', 'translate-y-0');
      } else {
        scrollToTopBtn.classList.add('opacity-0', 'invisible', 'translate-y-4');
        scrollToTopBtn.classList.remove('opacity-100', 'visible', 'translate-y-0');
      }
    });
    scrollToTopBtn.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    const themeToggle = document.getElementById('theme-toggle');
    if (themeToggle) {
      const html = document.documentElement;
      const darkIcon = document.getElementById('theme-icon-dark');
      const lightIcon = document.getElementById('theme-icon-light');

      // Check saved theme
      if (localStorage.getItem('theme') === 'light') {
        html.classList.remove('dark');
        darkIcon.classList.add('hidden');
        lightIcon.classList.remove('hidden');
      }

      themeToggle.addEventListener('click', () => {
        html.classList.toggle('dark');
        if (html.classList.contains('dark')) {
          localStorage.setItem('theme', 'dark');
          darkIcon.classList.remove('hidden');
          lightIcon.classList.add('hidden');
        } else {
          localStorage.setItem('theme', 'light');
          darkIcon.classList.add('hidden');
          lightIcon.classList.remove('hidden');
        }
      });
    }
  </script>
