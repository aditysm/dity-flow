name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies 🔧
        run: npm ci

      - name: Build Applet 🚀
        run: npm run build

      - name: Deploy to GitHub Pages 🍀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          # Jika Anda menggunakan domain kustom seperti flow.dity.web.id,
          # Anda bisa mengaktifkan baris di bawah ini agar GitHub Pages tidak menghapus kustom domain Anda:
          cname: flow.dity.web.id
