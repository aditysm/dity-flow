  <script>
    (function() {
      function updateFavicon(isDark) {
        const favicon = document.querySelector('link[rel="icon"]');
        if (favicon) {
          if (isDark) {
            favicon.setAttribute('href', 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect x="3" y="3" width="94" height="94" rx="28" fill="%23121214" stroke="%23242426" stroke-width="6"/><path d="M 34,28 L 12,50 L 34,72 M 46,28 L 68,50 L 46,72 M 66,28 L 88,50 L 66,72" fill="none" stroke="%2300ba68" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/></svg>');
          } else {
            favicon.setAttribute('href', 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect x="0" y="0" width="100" height="100" rx="28" fill="%2300ba68"/><path d="M 34,28 L 12,50 L 34,72 M 46,28 L 68,50 L 46,72 M 66,28 L 88,50 L 66,72" fill="none" stroke="%23ffffff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/></svg>');
          }
        }
      }
      const theme = localStorage.getItem('theme') || 'dark';
      const isDark = theme === 'dark';
      if (isDark) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', () => updateFavicon(isDark));
      } else {
        updateFavicon(isDark);
      }
      window.__updateFavicon = updateFavicon;
    })();
  </script>

      --color-text-dim: #8E8E93;

    html, body {

    }
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: var(--color-border);
      border-radius: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: var(--color-accent);
    }
    
    /* Shimmer button styling */
    @keyframes shimmer {
      0% {
        transform: translateX(-150%) skewX(-25deg);
      }
      100% {
        transform: translateX(150%) skewX(-25deg);
      }
    }
    .shimmer-btn {
      position: relative;
      overflow: hidden;
    }
    .shimmer-btn::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        90deg,
        rgba(255, 255, 255, 0) 0%,
        rgba(255, 255, 255, 0.15) 25%,
        rgba(255, 255, 255, 0.3) 50%,
        rgba(255, 255, 255, 0.15) 75%,
        rgba(255, 255, 255, 0) 100%
      );
      transform: translateX(-150%) skewX(-25deg);
      animation: shimmer 4s infinite ease-in-out;
      pointer-events: none;
    }
  </style>
